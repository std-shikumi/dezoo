              padding-bottom: 6px;
              border-bottom: 2px solid #1a1a1a;
              margin-bottom: 6px;
            }

            .pool-title {
              font-weight: 900;
              font-size: 12px;
              letter-spacing: 0.08em;
              display: flex;
              align-items: center;
              gap: 8px;
            }

            .pool-hint {
              font-weight: 400;
              font-size: 10px;
              color: #888;
              letter-spacing: 0;
            }

            .pool-count {
              font-family: 'Roboto Mono', monospace;
              font-size: 10px;
              background: #1a1a1a;
              color: #fff;
              padding: 1px 5px;
            }

            .worker-grid {
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
              gap: 3px;
            }

            .worker-chip {
              background: #f4f4f0;
              border: 1.5px solid #1a1a1a;
              padding: 4px 4px;
              font-size: 11px;
              font-weight: 700;
              cursor: grab;
              text-align: center;
              user-select: none;
              touch-action: none;
              position: relative;
              line-height: 1.2;
              letter-spacing: -0.02em;
              overflow: hidden;
              text-overflow: ellipsis;
              white-space: nowrap;
            }

            @media (min-width: 1024px) {
              .demen-main {
                padding: 12px;
              }
            }

            /* (worker-pool styles defined above) */

            .worker-chip:active {
              cursor: grabbing;
            }

            .worker-chip.tap-mode {
              background: #ff6b35;
              color: #fff;
              border-color: #ff6b35;
              animation: pulse 1s ease-in-out infinite;
            }

            .worker-chip.assigned {
              opacity: 0.32;
              background: #e8e8e0;
              border-style: dashed;
              border-color: #999;
              color: #555;
            }

            .worker-chip.assigned:hover {
              opacity: 0.7;
            }

            .assigned-check {
              position: absolute;
              top: 1px;
              right: 3px;
              font-size: 9px;
              color: #2d8a47;
              font-weight: 900;
            }

            /* アクティブ曜日のハイライト（強調版） */
            .grid-header.active-day {
              background: #ff6b35 !important;
              color: #fff !important;
              position: relative;
              box-shadow: 0 4px 0 #ff6b35;
            }
            .grid-header.active-day.sat,
            .grid-header.active-day.sun {
              background: #ff6b35 !important;
            }

            .grid-day-remaining {
              display: block;
              font-size: 9px;
              font-family: 'Roboto Mono', monospace;
              font-weight: 500;
              opacity: 0.8;
              margin-top: 1px;
              letter-spacing: 0.02em;
            }

            .day-cell.active-day-col {
              background: #fff0d6;
              box-shadow: inset 2px 0 0 #ff6b35, inset -2px 0 0 #ff6b35;
            }
            .day-cell.active-day-col:hover {
              background: #ffe5b8;
            }

            /* 「曜日 日付 編集中」マーカー（パレット側に表示） */
            .active-day-marker {
              display: inline-flex;
              align-items: center;
              gap: 6px;
              background: #ff6b35;
              color: #fff;
              padding: 3px 6px 3px 8px;
              font-weight: 900;
              letter-spacing: 0.04em;
              line-height: 1;
              border: 2px solid #ff6b35;
              margin: 0 8px 0 4px;
            }
            .active-day-marker-day {
              font-size: 14px;
            }
            .active-day-marker-date {
              font-family: 'Roboto Mono', monospace;
              font-size: 12px;
              font-weight: 700;
            }
            .active-day-marker-label {
              background: #fff;
              color: #ff6b35;
              padding: 2px 6px;
              font-size: 10px;
              font-weight: 900;
              letter-spacing: 0.05em;
            }

            @keyframes pulse {
              0%, 100% { transform: scale(1); }
              50% { transform: scale(1.05); }
            }

            /* グリッド */
            .schedule-wrapper {
              background: #fff;
              border: 2px solid #1a1a1a;
              overflow-x: auto;
            }

            .schedule-grid {
              display: grid;
              grid-template-columns: 110px repeat(7, minmax(120px, 1fr));
              min-width: 100%;
            }

            .grid-cell {
              border-right: 1px solid #ddd;
              border-bottom: 1px solid #ddd;
              padding: 4px;
              min-height: 60px;
              background: #fff;
            }

            .grid-cell:last-child {
              border-right: none;
            }

            .grid-header {
              background: #1a1a1a;
              color: #fff;
              font-weight: 900;
              padding: 8px 6px;
              text-align: center;
              font-size: 12px;
              position: sticky;
              top: 0;
              z-index: 5;
            }

            .grid-header.sat { background: #2c5aa0; }
            .grid-header.sun { background: #c0392b; }

            .grid-day-num {
              font-family: 'Roboto Mono', monospace;
              font-size: 14px;
              display: block;
              margin-top: 2px;
            }

            .site-cell {
              background: #f4f4f0;
              font-weight: 700;
              font-size: 12px;
              padding: 6px;
              display: flex;
              align-items: center;
              gap: 4px;
              border-right: 2px solid #1a1a1a;
              position: sticky;
              left: 0;
              z-index: 4;
            }

            .site-cell.day-type {
              background: #fff4e6;
              border-left: 4px solid #f39c12;
            }
            .site-cell.night-type {
              background: #e8e6f0;
              border-left: 4px solid #5d4e8a;
            }
            .site-cell.special-type {
              background: #f0f0f0;
              border-left: 4px solid #888;
              color: #555;
            }

            .site-name {
              flex: 1;
              line-height: 1.2;
              word-break: break-word;
            }

            .site-icon {
              flex-shrink: 0;
            }

            .day-cell {
              display: flex;
              flex-direction: column;
              gap: 2px;
              align-items: stretch;
              cursor: pointer;
              min-height: 50px;
            }

            .day-cell.drop-active {
              background: #fff4e6;
              outline: 2px dashed #ff6b35;
              outline-offset: -2px;
            }

            .day-cell.tap-target {
              background: #fff4e6;
              outline: 2px solid #ff6b35;
              outline-offset: -2px;
            }

            .day-cell.cell-active {
              outline: 2px solid #1a1a1a;
              outline-offset: -2px;
              z-index: 2;
            }

            /* 人員チップ：選択中・非選択中の視覚 */
            .placed-worker.worker-selected {
              outline: 2px solid #ff6b35;
              outline-offset: 1px;
              box-shadow: 0 0 0 1px #fff, 0 2px 6px rgba(255,107,53,0.5);
              z-index: 3;
              position: relative;
              filter: brightness(1.15);
            }
            .placed-worker.worker-faded {
              opacity: 0.35;
              filter: grayscale(0.4);
            }
            .placed-worker.worker-faded:hover {
              opacity: 0.7;
            }

            .rect-select-overlay {
              position: fixed;
              background: rgba(255, 107, 53, 0.15);
              border: 1.5px dashed #ff6b35;
              pointer-events: none;
              z-index: 50;
            }

            /* ドラッグ中のゴースト（複数人移動時のカウントバッジ付き） */
            .drag-ghost {
              position: absolute;
              top: -9999px;
              left: -9999px;
              background: #1a1a1a;
              color: #fff;
              padding: 6px 10px;
              font-family: 'Noto Sans JP', sans-serif;
              font-weight: 700;
              font-size: 12px;
              border: 2px solid #ff6b35;
              box-shadow: 4px 4px 0 rgba(255,107,53,0.4);
              display: flex;
              align-items: center;
              gap: 8px;
              white-space: nowrap;
            }
            .drag-ghost-name {
              max-width: 140px;
              overflow: hidden;
              text-overflow: ellipsis;
            }
            .drag-ghost-count {
              background: #ff6b35;
              color: #fff;
              font-family: 'Roboto Mono', monospace;
              font-weight: 900;
              font-size: 14px;
              padding: 2px 8px;
              min-width: 24px;
              text-align: center;
              line-height: 1;
            }

            .context-menu {
              position: fixed;
              background: #fff;
              border: 2px solid #1a1a1a;
              z-index: 300;
              min-width: 200px;
              padding: 4px 0;
              box-shadow: 4px 4px 0 #1a1a1a;
              user-select: none;
            }
            .context-menu button {
              display: block;
              width: 100%;
              text-align: left;
              background: none;
              border: none;
              padding: 8px 14px;
              font-family: inherit;
              font-size: 13px;
              font-weight: 600;
              cursor: pointer;
              color: #1a1a1a;
            }
            .context-menu button:hover:not(:disabled) {
              background: #ff6b35;
              color: #fff;
            }
            .context-menu button:hover:not(:disabled) .menu-shortcut {
              color: rgba(255,255,255,0.8);
            }
            .context-menu button:disabled {
              color: #bbb;
              cursor: not-allowed;
            }
            .context-menu .menu-divider {
              height: 1px;
              background: #ddd;
              margin: 2px 0;
            }
            .context-menu .menu-shortcut {
              float: right;
              color: #888;
              font-size: 11px;
              font-family: 'Roboto Mono', monospace;
              margin-left: 16px;
            }
            .context-menu .menu-section-label {
              padding: 6px 14px 4px;
              font-size: 10px;
              font-weight: 700;
              color: #fff;
              background: #1a1a1a;
              letter-spacing: 0.08em;
              border-bottom: 2px solid #ff6b35;
            }
            .context-menu .menu-count {
              font-size: 11px;
              color: #ff6b35;
              font-family: 'Roboto Mono', monospace;
              font-weight: 700;
              margin-left: 4px;
            }
            .context-menu button:hover:not(:disabled) .menu-count {
              color: #fff;
            }

            .placed-worker {
              background: #f4f4f0;
              color: #1a1a1a;
              border: 1.5px solid #1a1a1a;
              padding: 2px 4px;
              font-size: 11px;
              font-weight: 700;
              display: flex;
              justify-content: space-between;
              align-items: center;
              line-height: 1.15;
              cursor: grab;
              user-select: none;
              touch-action: none;
              gap: 2px;
              min-width: 0;
              min-height: 20px;
              overflow: hidden;
              letter-spacing: -0.02em;
            }

            .placed-worker.dense {
              padding: 0 3px;
              font-size: 9px;
              letter-spacing: -0.04em;
              gap: 1px;
              border-width: 1px;
            }
            .placed-worker.dense .placed-remove {
              font-size: 10px;
            }

            /* 現場種別アクセントは出面表の現場行(左)に集約。チップ側には付けない */

            .placed-name {
              flex: 1;
              min-width: 0;
              word-break: break-all;
              overflow-wrap: break-word;
              line-height: 1.15;
            }

            .placed-remove {
              background: none;
              border: none;
              color: inherit;
              cursor: pointer;
              padding: 0;
              opacity: 0.7;
              font-size: 14px;
              line-height: 1;
            }

            .placed-remove:hover { opacity: 1; }

            /* モーダル */
            .modal-backdrop {
              position: fixed;
              inset: 0;
              background: rgba(0,0,0,0.6);
              z-index: 100;
              display: flex;
              align-items: center;
              justify-content: center;
              padding: 16px;
            }

            .modal {
              background: #fff;
              border: 2px solid #1a1a1a;
              width: 100%;
              max-width: 600px;
              max-height: 90vh;
              overflow-y: auto;
            }

            .modal-header {
              background: #1a1a1a;
              color: #fff;
              padding: 12px 16px;
              display: flex;
              justify-content: space-between;
              align-items: center;
              font-weight: 900;
            }

            .modal-body {
              padding: 16px;
            }

            .modal-tabs {
              display: flex;
              border-bottom: 2px solid #1a1a1a;
              margin-bottom: 12px;
            }

            .modal-tab {
              flex: 1;
              padding: 10px;
              background: #f4f4f0;
              border: none;
              border-right: 1px solid #ddd;
              cursor: pointer;
              font-weight: 700;
              font-family: inherit;
              font-size: 13px;
            }

            .modal-tab:last-child { border-right: none; }

            .modal-tab.active {
              background: #ff6b35;
              color: #fff;
            }

            .input {
              width: 100%;
              padding: 8px 10px;
              border: 2px solid #1a1a1a;
              font-family: inherit;
              font-size: 14px;
            }

            .input:focus {
              outline: none;
              background: #fff4e6;
            }

            .form-row {
              display: flex;
              gap: 6px;
              margin-bottom: 12px;
            }

            .form-row .input { flex: 1; }

            .item-list {
              display: flex;
              flex-direction: column;
              gap: 4px;
            }

            .item-row {
              display: flex;
              align-items: center;
              gap: 6px;
              padding: 6px 8px;
              background: #f4f4f0;
              border: 1px solid #ddd;
            }

            .item-name {
              flex: 1;
              font-weight: 500;
            }

            .item-badge {
              font-size: 10px;
              font-weight: 700;
              padding: 2px 6px;
              background: #1a1a1a;
              color: #fff;
            }
            .item-badge.day-badge { background: #f39c12; }
            .item-badge.night-badge { background: #5d4e8a; }
            .item-badge.special-badge { background: #888; }

            /* 人員行（カラー・所属・並び替え対応版） */
            .worker-row {
              display: grid;
              grid-template-columns: 18px 1fr 110px auto auto;
              align-items: center;
              gap: 6px;
              padding: 5px 6px;
              background: #f4f4f0;
              border: 1px solid #ddd;
              position: relative;
            }
            .worker-name-cell {
              font-weight: 600;
              cursor: text;
              padding: 4px 6px;
              border-bottom: 1px dashed transparent;
            }
            .worker-name-cell:hover {
              border-bottom-color: #ff6b35;
            }
            .affiliation-input {
              padding: 4px 6px !important;
              font-size: 12px !important;
              border-width: 1px !important;
            }
            .color-palette {
              display: flex;
              gap: 2px;
              align-items: center;
            }
            .color-swatch {
              width: 18px;
              height: 18px;
              border: 1.5px solid #999;
              padding: 0;
              cursor: pointer;
              background: #fff;
              font-size: 10px;
              line-height: 1;
              color: #888;
              font-family: inherit;
            }
            .color-swatch:hover {
              transform: scale(1.15);
            }
            .color-swatch.active {
              border-width: 2.5px;
              box-shadow: 0 0 0 1px #fff inset;
            }

            /* メモ行 (BBQ・新年会など) */
            .memo-label-cell {
              background: #fff4e6;
              font-weight: 900;
              font-size: 12px;
              padding: 6px;
              border-right: 2px solid #1a1a1a;
              border-bottom: 1px solid #ddd;
              position: sticky;
              left: 0;
              z-index: 4;
              display: flex;
              align-items: center;
              letter-spacing: 0.05em;
              color: #ff6b35;
            }
            .memo-row-cell {
              border-right: 1px solid #ddd;
              border-bottom: 1px solid #ddd;
              padding: 4px;
              background: #fff;
              min-height: 44px;
            }
            .memo-input {
              width: 100%;
              min-height: 38px;
              border: 1.5px dashed #ff6b35;
              padding: 4px 6px;
              font-family: inherit;
              font-size: 12px;
              font-weight: 600;
              resize: vertical;
              background: #fff;
              line-height: 1.3;
            }
            .memo-input:focus {
              outline: none;
              border-style: solid;
              background: #fff4e6;
            }
            .memo-input::placeholder {
              color: #bbb;
              font-weight: 400;
            }

            /* 会社休日 - 列ヘッダ表示 */
            .grid-header.holiday-day {
              background: #6b6b6b !important;
            }
            .grid-header.holiday-day.active-day {
              background: #ff6b35 !important;
            }
            .grid-day-holiday {
              display: block;
              font-size: 9px;
              font-weight: 900;
              background: #fff;
              color: #444;
              padding: 1px 4px;
              margin-top: 2px;
              letter-spacing: 0.05em;
            }

            /* 会社休日 - セル(グレー網掛け) */
            .day-cell.holiday-cell {
              background: repeating-linear-gradient(
                45deg,
                #e0e0e0,
                #e0e0e0 4px,
                #f0f0f0 4px,
                #f0f0f0 10px
              ) !important;
              position: relative;
            }
            .day-cell.holiday-cell::before {
              content: '休';
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              font-size: 14px;
              font-weight: 900;
              color: rgba(80, 80, 80, 0.3);
              pointer-events: none;
              letter-spacing: 0.1em;
            }
            .day-cell.holiday-cell .placed-worker {
              position: relative;
              z-index: 1;
            }
            .day-cell.holiday-cell.active-day-col {
              background: repeating-linear-gradient(
                45deg,
                #ffe5cc,
                #ffe5cc 4px,
                #fff0d6 4px,
                #fff0d6 10px
              ) !important;
            }

            /* 予定登録モーダル一覧 */
            .schedule-list {
              display: flex;
              flex-direction: column;
              gap: 4px;
              max-height: 320px;
              overflow-y: auto;
              border: 1px solid #ddd;
              padding: 4px;
              background: #fafafa;
            }
            .schedule-row {
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 6px 8px;
              background: #fff;
              border: 1px solid #ddd;
              font-size: 12px;
            }
            .schedule-date {
              font-family: 'Roboto Mono', monospace;
              font-weight: 700;
              flex: 0 0 auto;
            }
            .schedule-tag {
              font-size: 10px;
              font-weight: 900;
              padding: 2px 6px;
              color: #fff;
              letter-spacing: 0.05em;
              flex: 0 0 auto;
            }
            .schedule-tag.holiday-tag { background: #555; }
            .schedule-tag.paid-tag { background: #2c5aa0; }
            .schedule-tag.rest-tag { background: #888; }
            .schedule-tag.training-tag { background: #5d4e8a; }
            .schedule-tag.required-tag { background: #c0392b; }
            .schedule-name {
              flex: 1;
              font-weight: 500;
              line-height: 1.4;
              word-break: break-all;
            }

            /* 優先メンバー選択ピッカー */
            .preferred-pick-grid {
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
              gap: 4px;
              max-height: 50vh;
              overflow-y: auto;
              padding: 4px;
              background: #f4f4f0;
              border: 1px solid #ddd;
            }
            .preferred-pick-chip {
              padding: 6px 6px;
              font-size: 12px;
              font-weight: 700;
              font-family: inherit;
              background: #fff;
              color: #1a1a1a;
              border: 1.5px solid #1a1a1a;
              cursor: pointer;
              text-align: center;
              line-height: 1.2;
              letter-spacing: -0.02em;
              user-select: none;
            }
            .preferred-pick-chip:hover {
              transform: translate(-1px, -1px);
              box-shadow: 2px 2px 0 #ff6b35;
            }
            .preferred-pick-chip.on {
              box-shadow: 0 0 0 2px #ff6b35 inset;
            }

            /* 並び替えD&Dガイドライン */
            .reorder-list { position: relative; }
            .reorder-handle {
              cursor: grab;
              user-select: none;
              color: #999;
              font-weight: 900;
              text-align: center;
              line-height: 1;
              letter-spacing: -1px;
            }
            .reorder-handle:active { cursor: grabbing; }
            .reorder-dragging {
              opacity: 0.4;
            }
            .reorder-above::before,
            .reorder-below::after {
              content: '';
              position: absolute;
              left: 0;
              right: 0;
              height: 0;
              border-top: 2px dashed #ff6b35;
              z-index: 5;
              pointer-events: none;
            }
            .reorder-above::before { top: -1px; }
            .reorder-below::after { bottom: -1px; }

            .empty-state {
              text-align: center;
              padding: 24px;
              color: #888;
              font-size: 13px;
            }

            select.input {
              background: #fff;
            }

            .csv-row {
              margin-bottom: 10px;
              padding: 8px;
              background: #f4f4f0;
              border-left: 3px solid #ff6b35;
            }

            .csv-help {
              background: #fff4e6;
              border: 1px dashed #ff6b35;
              padding: 10px;
              font-size: 12px;
              line-height: 1.6;
              margin-bottom: 12px;
            }

            .csv-help code {
              background: #fff;
              padding: 1px 4px;
              font-family: 'Roboto Mono', monospace;
              font-size: 11px;
              border: 1px solid #ddd;
              display: inline-block;
              margin: 1px 0;
            }

            .csv-mode-row {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 6px;
              margin-bottom: 12px;
            }

            .csv-mode {
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 8px 10px;
              border: 2px solid #ccc;
              background: #f4f4f0;
              cursor: pointer;
              font-size: 12px;
            }

            .csv-mode.active {
              border-color: #ff6b35;
              background: #fff4e6;
            }

            .csv-mode input[type="radio"] {
              margin: 0;
            }

            .csv-mode small {
              color: #666;
              font-size: 10px;
            }

            .csv-file-row {
              display: flex;
              gap: 8px;
              align-items: center;
              margin-bottom: 8px;
              flex-wrap: wrap;
            }

            .csv-textarea {
              font-family: 'Roboto Mono', monospace;
              font-size: 12px;
              line-height: 1.5;
              resize: vertical;
              min-height: 140px;
            }

            /* トースト */
            .toast {
              position: fixed;
              bottom: 24px;
              left: 50%;
              transform: translateX(-50%);
              background: #1a1a1a;
              color: #fff;
              padding: 10px 20px;

                            setScheduleForm(f => ({ ...f, date: '', workerId: '' }));
                          }}>
                            <Plus size={14} /> 登録
                          </button>
                        </div>
                        <div className="schedule-list">
                          {(data.schedules?.leaves || []).slice().sort((a,b) => a.date.localeCompare(b.date)).map(l => {
                            const w = data.workers.find(x => x.id === l.workerId);
                            return (
                              <div key={l.id} className="schedule-row">
                                <span className="schedule-date">{formatFullDate(l.date, 0)}</span>
                                <span className={`schedule-tag ${l.type === 'paid' ? 'paid-tag' : 'rest-tag'}`}>
                                  {l.type === 'paid' ? '有給' : '休み'}
                                </span>
                                <span className="schedule-name">{w?.name || '(削除済)'}</span>
                                <button className="btn btn-sm btn-danger" onClick={() => deleteSchedule('leaves', l.id)}>
                                  <Trash2 size={12} />
                                </button>
                              </div>
                            );
                          })}
                          {(data.schedules?.leaves || []).length === 0 && (
                            <div className="empty-state">登録された休暇予定はありません</div>
                          )}
                        </div>
                      </>
                    )}

                    {/* === 講習 === */}
                    {scheduleTab === 'trainings' && (
                      <>
                        <div style={{ fontSize: 12, color: '#666', marginBottom: 10, lineHeight: 1.5 }}>
                          講習日と対象人員(複数可)を登録します。登録すると該当人員が「講習」セルに即時配置されます。
                        </div>
                        <div className="form-row">
                          <input
                            type="date"
                            className="input"
                            style={{ flex: '0 0 160px' }}
                            value={scheduleForm.date}
                            onChange={(e) => setScheduleForm(f => ({ ...f, date: e.target.value }))}
                          />
                          <button className="btn btn-primary" onClick={() => {
                            addTraining(scheduleForm.date, scheduleForm.workerIds);
                            setScheduleForm(f => ({ ...f, date: '', workerIds: [] }));
                          }}>
                            <Plus size={14} /> 登録 ({scheduleForm.workerIds.length}名)
                          </button>
                        </div>
                        <div className="preferred-pick-grid" style={{ marginBottom: 12 }}>
                          {activeWorkers.map(w => {
                            const isOn = scheduleForm.workerIds.includes(w.id);
                            const palette = w.color ? getColor(w.color) : null;
                            const style = isOn
                              ? (palette ? { background: palette.bg, color: palette.fg, borderColor: palette.fg } : { background: '#1a1a1a', color: '#fff', borderColor: '#1a1a1a' })
                              : {};
                            return (
                              <button
                                key={w.id}
                                type="button"
                                className={`preferred-pick-chip ${isOn ? 'on' : ''}`}
                                style={style}
                                onClick={() => setScheduleForm(f => ({
                                  ...f,
                                  workerIds: f.workerIds.includes(w.id)
                                    ? f.workerIds.filter(x => x !== w.id)
                                    : [...f.workerIds, w.id],
                                }))}
                              >{w.name}</button>
                            );
                          })}
                        </div>
                        <div className="schedule-list">
                          {(data.schedules?.trainings || []).slice().sort((a,b) => a.date.localeCompare(b.date)).map(t => (
                            <div key={t.id} className="schedule-row">
                              <span className="schedule-date">{formatFullDate(t.date, 0)}</span>
                              <span className="schedule-tag training-tag">講習</span>
                              <span className="schedule-name">
                                {t.workerIds.map(wid => data.workers.find(x => x.id === wid)?.name).filter(Boolean).join(', ')} ({t.workerIds.length}名)
                              </span>
                              <button className="btn btn-sm btn-danger" onClick={() => deleteSchedule('trainings', t.id)}>
                                <Trash2 size={12} />
                              </button>
                            </div>
                          ))}
                          {(data.schedules?.trainings || []).length === 0 && (
                            <div className="empty-state">登録された講習予定はありません</div>
                          )}
                        </div>
                      </>
                    )}

                    {/* === 必須人員 === */}
                    {scheduleTab === 'required' && (
                      <>
                        <div style={{ fontSize: 12, color: '#666', marginBottom: 10, lineHeight: 1.5 }}>
                          特定の日に特定の現場へ必ず配置したい人員を登録します(竣工検査などで活用)。<br/>
                          登録すると該当セルへ即時配置されます。
                        </div>
                        <div className="form-row" style={{ flexWrap: 'wrap' }}>
                          <input
                            type="date"
                            className="input"
                            style={{ flex: '0 0 160px' }}
                            value={scheduleForm.date}
                            onChange={(e) => setScheduleForm(f => ({ ...f, date: e.target.value }))}
                          />
                          <select
                            className="input"
                            value={scheduleForm.siteId}
                            onChange={(e) => setScheduleForm(f => ({ ...f, siteId: e.target.value }))}
                          >
                            <option value="">現場を選択…</option>
                            {activeSites.filter(s => s.type !== 'special').map(s => (
                              <option key={s.id} value={s.id}>{s.name}</option>
                            ))}
                          </select>
                          <button className="btn btn-primary" onClick={() => {
                            addRequired(scheduleForm.date, scheduleForm.siteId, scheduleForm.workerIds);
                            setScheduleForm(f => ({ ...f, date: '', siteId: '', workerIds: [] }));
                          }}>
                            <Plus size={14} /> 登録 ({scheduleForm.workerIds.length}名)
                          </button>
                        </div>
                        <div className="preferred-pick-grid" style={{ marginBottom: 12 }}>
                          {activeWorkers.map(w => {
                            const isOn = scheduleForm.workerIds.includes(w.id);
                            const palette = w.color ? getColor(w.color) : null;
                            const style = isOn
                              ? (palette ? { background: palette.bg, color: palette.fg, borderColor: palette.fg } : { background: '#1a1a1a', color: '#fff', borderColor: '#1a1a1a' })
                              : {};
                            return (
                              <button
                                key={w.id}
                                type="button"
                                className={`preferred-pick-chip ${isOn ? 'on' : ''}`}
                                style={style}
                                onClick={() => setScheduleForm(f => ({
                                  ...f,
                                  workerIds: f.workerIds.includes(w.id)
                                    ? f.workerIds.filter(x => x !== w.id)
                                    : [...f.workerIds, w.id],
                                }))}
                              >{w.name}</button>
                            );
                          })}
                        </div>
                        <div className="schedule-list">
                          {(data.schedules?.required || []).slice().sort((a,b) => a.date.localeCompare(b.date)).map(r => {
                            const site = data.sites.find(s => s.id === r.siteId);
                            return (
                              <div key={r.id} className="schedule-row">
                                <span className="schedule-date">{formatFullDate(r.date, 0)}</span>
                                <span className="schedule-tag required-tag">必須</span>
                                <span className="schedule-name">
                                  {site?.name || '(削除済)'} →{' '}
                                  {r.workerIds.map(wid => data.workers.find(x => x.id === wid)?.name).filter(Boolean).join(', ')} ({r.workerIds.length}名)
                                </span>
                                <button className="btn btn-sm btn-danger" onClick={() => deleteSchedule('required', r.id)}>
                                  <Trash2 size={12} />
                                </button>
                              </div>
                            );
                          })}
                          {(data.schedules?.required || []).length === 0 && (
                            <div className="empty-state">登録された必須人員はありません</div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* 優先メンバー編集モーダル */}
            {preferredEditSite && (() => {
              const site = data.sites.find(s => s.id === preferredEditSite);
              if (!site) return null;
              const selected = new Set(site.preferredWorkerIds || []);
              const toggle = (wid) => {
                const next = new Set(selected);
                if (next.has(wid)) next.delete(wid);
                else next.add(wid);
                updateSitePreferred(site.id, [...next]);
              };
              return (
                <div className="modal-backdrop no-print" style={{ zIndex: 110 }} onClick={() => setPreferredEditSite(null)}>
                  <div className="modal" onClick={(e) => e.stopPropagation()}>
                    <div className="modal-header">
                      <span>優先メンバー: {site.name}</span>
                      <button className="btn btn-sm" onClick={() => setPreferredEditSite(null)}><X size={14} /></button>
                    </div>
                    <div className="modal-body">
                      <div style={{ fontSize: 12, color: '#666', marginBottom: 10, lineHeight: 1.5 }}>
                        この現場に「優先的に配置したい人員」を選択してください。<br/>
                        曜日メニューの「自動配置」実行時、最優先で配置されます。
                      </div>
                      <div className="preferred-pick-grid">
                        {activeWorkers.map(w => {
                          const isOn = selected.has(w.id);
                          const palette = w.color ? getColor(w.color) : null;
                          const style = palette && isOn
                            ? { background: palette.bg, color: palette.fg, borderColor: palette.fg }
                            : (isOn ? { background: '#1a1a1a', color: '#fff', borderColor: '#1a1a1a' } : {});
                          return (
                            <button
                              key={w.id}
                              type="button"
                              className={`preferred-pick-chip ${isOn ? 'on' : ''}`}
                              style={style}
                              onClick={() => toggle(w.id)}
                            >
                              {w.name}
                            </button>
                          );
                        })}
                        {activeWorkers.length === 0 && (
                          <div className="empty-state">先に人員を追加してください</div>
                        )}
                      </div>
                      <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
                        <button className="btn" style={{ flex: 1 }} onClick={() => updateSitePreferred(site.id, [])}>
                          全解除
                        </button>
                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => setPreferredEditSite(null)}>
                          完了
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* 印刷プレビュー */}
            {showPrintPreview && (
              <div className="print-preview-modal">
                <div className="print-preview-bar no-print">
                  <span className="print-preview-title">印刷プレビュー</span>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn btn-primary" onClick={() => {
                      quickSave();
                      // トーストの後に印刷ダイアログが出るよう少し遅延
                      setTimeout(() => window.print(), 100);
                    }}>
                      <Download size={14} /> 印刷 / PDF保存
                    </button>
                    <button className="btn" onClick={() => setShowPrintPreview(false)}>
                      <X size={14} /> 閉じる
                    </button>
                  </div>
                </div>

                <div className="print-page">
                  <div className="print-page-header">
                    <div className="print-title-block">
                      <div className="print-title">工事出面表</div>
                      <div className="print-period">{getWeekRangeFull()}</div>
                    </div>
                    <div className="print-revision">
                      {formatTodayJP()}訂正バージョン
                    </div>
                  </div>

                  <table className="print-table">
                    <thead>
                      <tr>
                        <th className="th-site">現場</th>
                        {DAY_LABELS.map((label, i) => {
                          const cls = i === 5 ? 'th-sat' : i === 6 ? 'th-sun' : '';
                          const dStr = (() => {
                            const d = parseLocalDate(data.weekStartDate);
                            d.setDate(d.getDate() + i);
                            return toLocalDateStr(d);
                          })();
                          const isHoliday = isCompanyHoliday(dStr);
                          return (
                            <th key={i} className={`${cls} ${isHoliday ? 'th-holiday' : ''}`}>
                              <div className="th-day">{label}</div>
                              <div className="th-date">{formatFullDate(data.weekStartDate, i)}</div>
                              {isHoliday && <div className="th-holiday-label">会社休日</div>}
                            </th>
                          );
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {/* メモ行(印刷): 何か入力があれば最上部に表示 */}
                      {currentWeekMemos.some(m => m && m.trim()) && (
                        <tr>
                          <td className="td-site">メモ</td>
                          {Array(7).fill(null).map((_, day) => (
                            <td key={day} className="td-memo-print">{currentWeekMemos[day] || ''}</td>
                          ))}
                        </tr>
                      )}
                      {orderedSites.map(site => (
                        <tr key={site.id}>
                          <td className="td-site">{site.name}</td>
                          {Array(7).fill(null).map((_, day) => {
                            const workerIds = currentAssignments[day]?.[site.id] || [];
                            const dStr = (() => {
                              const d = parseLocalDate(data.weekStartDate);
                              d.setDate(d.getDate() + day);
                              return toLocalDateStr(d);
                            })();
                            const isHoliday = isCompanyHoliday(dStr);
                            return (
                              <td key={day} className={`td-workers ${isHoliday ? 'td-holiday' : ''}`}>
                                <div className="print-workers-grid">
                                  {workerIds.map(wid => {
                                    const w = data.workers.find(x => x.id === wid);
                                    return w ? (
                                      <div key={wid} className="print-worker">{w.name}</div>
                                    ) : null;
                                  })}
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 矩形選択オーバーレイ */}
            {rectSelect && (
              <div
                className="rect-select-overlay no-print"
                style={{
                  left: Math.min(rectSelect.startX, rectSelect.currX),
                  top: Math.min(rectSelect.startY, rectSelect.currY),
                  width: Math.abs(rectSelect.currX - rectSelect.startX),
                  height: Math.abs(rectSelect.currY - rectSelect.startY),
                }}
              />
            )}

            {/* 右クリックメニュー */}
            {contextMenu && (
              <div
                className="context-menu no-print"
                style={{ left: contextMenu.x, top: contextMenu.y }}
                onClick={(e) => e.stopPropagation()}
                onContextMenu={(e) => e.preventDefault()}
              >
                {contextMenu.kind === 'day' ? (
                  <>
                    <div className="menu-section-label">{DAY_LABELS[contextMenu.day]}曜日</div>
                    <button onClick={() => { autoAssignDay(contextMenu.day); setContextMenu(null); }}>
                      自動配置
                    </button>
                    <button onClick={() => { copyDay(contextMenu.day); setContextMenu(null); }}>
                      コピー
                    </button>
                    <button
                      onClick={() => { pasteDay(contextMenu.day); setContextMenu(null); }}
                      disabled={!clipboard}
                    >
                      ペースト{clipboard && (
                        <span className="menu-count">
                          ({clipboard.items.reduce((s, it) => s + it.workerIds.length, 0)}名)
                        </span>
                      )}
                    </button>
                    <div className="menu-divider" />
                    <button onClick={() => { clearDay(contextMenu.day); setContextMenu(null); }}>
                      すべてクリア
                    </button>
                  </>
                ) : (
                  <>
                    <button
                      onClick={() => { buildClipboard('copy'); setContextMenu(null); }}
                      disabled={selectedWorkers.size === 0}
                    >コピー <span className="menu-count">({selectedWorkers.size}名)</span><span className="menu-shortcut">Ctrl+C</span></button>
                    <button
                      onClick={() => { buildClipboard('cut'); setContextMenu(null); }}
                      disabled={selectedWorkers.size === 0}
                    >カット<span className="menu-shortcut">Ctrl+X</span></button>
                    <button
                      onClick={() => { pasteClipboard(); setContextMenu(null); }}
                      disabled={!clipboard || !activeCell}
                    >ペースト<span className="menu-shortcut">Ctrl+V</span></button>
                    <div className="menu-divider" />
                    <button
                      onClick={() => { clearSelectedWorkers(); setContextMenu(null); }}
                      disabled={selectedWorkers.size === 0}
                    >選択を削除<span className="menu-shortcut">Del</span></button>
                    <button
                      onClick={() => { setSelectedWorkers(new Set()); setActiveCell(null); setContextMenu(null); }}
                      disabled={selectedWorkers.size === 0}
                    >選択解除<span className="menu-shortcut">Esc</span></button>
                  </>
                )}
              </div>
            )}

            {/* トースト */}
            {toast && (
              <div className="toast no-print">
                {toast}
              </div>
            )}
          </div>
        </>
      );
    }

    function WorkerChip({ worker, isAssigned, isTapMode, onDragStart, onDragEnd, onClick }) {
      const palette = worker.color ? getColor(worker.color) : null;
      const style = palette && !isAssigned && !isTapMode
        ? { background: palette.bg, color: palette.fg, borderColor: palette.fg }
        : {};
      return (
        <div
          className={`worker-chip ${isTapMode ? 'tap-mode' : ''} ${isAssigned ? 'assigned' : ''}`}
          style={style}
          draggable
          onDragStart={(e) => {
            onDragStart();
            e.dataTransfer.effectAllowed = 'copy';
          }}
          onDragEnd={onDragEnd}
          onClick={onClick}
          title={worker.affiliation ? `所属: ${worker.affiliation}` : undefined}
        >
          {worker.name}
          {isAssigned && <span className="assigned-check">✓</span>}
        </div>
      );
    }

    function SiteEditor({ site, onSave, onCancel }) {
      const [name, setName] = useState(site.name);
      const [type, setType] = useState(site.type);

      return (
        <>
          <input
            className="input"
            value={name}
            onChange={(e) => setName(e.target.value)}
            autoFocus
            onKeyDown={(e) => {
              if (e.key === 'Enter') onSave(site.id, name, type);
              if (e.key === 'Escape') onCancel();
            }}
          />
          <select
            className="input"
            style={{ flex: 0, minWidth: 80 }}
            value={type}
            onChange={(e) => setType(e.target.value)}
          >
            <option value="day">昼</option>
            <option value="night">夜</option>
          </select>
          <button className="btn btn-sm btn-primary" onClick={() => onSave(site.id, name, type)}>OK</button>
          <button className="btn btn-sm" onClick={onCancel}><X size={12} /></button>
        </>
      );
    }

    createRoot(document.getElementById('root')).render(<DemenApp />);
  </script>
</body>
</html>
