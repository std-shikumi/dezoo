    // ============================================================
    // 編集はここまで。以下はアプリ本体です(編集不要)
    // ============================================================

    // 初期データCSVの簡易パーサ
    function parseInitialLines(csv) {
      return (csv || '').split('\n')
        .map(l => l.trim())
        .filter(l => l && !l.startsWith('#'));
    }
    function parseInitialDateStr(str) {
      let m = str.match(/^(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})日?$/);
      if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      m = str.match(/^(\d{1,2})[/-](\d{1,2})$/);
      if (m) {
        const y = new Date().getFullYear();
        return `${y}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
      }
      return null;
    }

    // ===== 型定義のためのコメント =====
    // Worker: { id, name } 例: { id: 'w1', name: 'H佐々木' }
    // Site: { id, name, type } type: 'day' | 'night' | 'special'
    // Assignment: { workerId, siteId, day, position } day: 0-6, position: 表示順
    // 特殊状態: 'rest'(休), 'training'(講習) は site として扱う

    const STORAGE_KEY = 'demen_app_data_v1';
    const SETTINGS_KEY = 'demen_app_settings_v1';

    const DAY_LABELS = ['月', '火', '水', '木', '金', '土', '日'];

    // 人員のカラーパレット (チップ背景を変える。印刷には反映しない)
    const COLOR_PALETTE = [
      { id: 'red',    bg: '#ffd0d0', fg: '#7a1a1a', label: '赤' },
      { id: 'orange', bg: '#ffdfb8', fg: '#7a3a00', label: '橙' },
      { id: 'yellow', bg: '#fff2b3', fg: '#5a4400', label: '黄' },
      { id: 'green',  bg: '#cceac0', fg: '#1f5a30', label: '緑' },
      { id: 'teal',   bg: '#bfe5e0', fg: '#0e4a4a', label: '青緑' },
      { id: 'blue',   bg: '#c8def8', fg: '#0a3a78', label: '青' },
      { id: 'purple', bg: '#e1ccf5', fg: '#3a1a6a', label: '紫' },
      { id: 'pink',   bg: '#ffd0e8', fg: '#7a1a55', label: '桃' },
      { id: 'gray',   bg: '#dcdcdc', fg: '#333',    label: '灰' },
    ];
    const getColor = (id) => COLOR_PALETTE.find(p => p.id === id);

    // 初期データ
    const getInitialData = () => {
      // INITIAL_DATA_CSVから人員・現場・会社休日を生成
      const initWorkers = parseInitialLines(INITIAL_DATA_CSV.workers).map((name, idx) => ({
        id: 'w_init_' + idx + '_' + Math.random().toString(36).slice(2, 5),
        name,
      }));

      const parseInitSiteType = (s) => {
        if (!s) return 'day';
        const t = s.trim().toLowerCase();
        if (t === '夜' || t === 'night' || t === 'n') return 'night';
        return 'day';
      };
      const initSites = parseInitialLines(INITIAL_DATA_CSV.sites).map((line, idx) => {
        const parts = line.split(/[,\t]/).map(s => s.trim());
        return {
          id: 's_init_' + idx + '_' + Math.random().toString(36).slice(2, 5),
          name: parts[0],
          type: parseInitSiteType(parts[1]),
        };
      }).filter(s => s.name);

      const initHolidays = parseInitialLines(INITIAL_DATA_CSV.holidays)
        .map((line, idx) => {
          const first = line.split(/[,\t]/)[0].trim();
          const date = parseInitialDateStr(first);
          return date ? { id: 'h_init_' + idx + '_' + Math.random().toString(36).slice(2, 5), date } : null;
        })
        .filter(Boolean);

      return {
        weekStartDate: (() => {
          const m = getMonday(new Date());
          const yyyy = m.getFullYear();
          const mm = String(m.getMonth() + 1).padStart(2, '0');
          const dd = String(m.getDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}`;
        })(),
        workers: initWorkers,
        sites: [
          ...initSites,
          { id: 'training', name: '講習', type: 'special' },
          { id: 'rest', name: '休み', type: 'special' },
          { id: 'paid_leave', name: '有給休暇', type: 'special' },
        ],
        // 週ごとに保持: assignmentsByWeek[weekStartDate][day][siteId] = [workerId, ...]
        assignmentsByWeek: {},
        // 予定登録(休日・休暇・講習・必須人員)
        schedules: { holidays: initHolidays, leaves: [], trainings: [], required: [] },
        // 週ごとメモ(BBQ、新年会など年に数回の一斉行事用)
        weekMemos: {},
      };
    };

    const emptyWeekAssignments = () => Array(7).fill(null).map(() => ({}));

    // 旧データ構造を新構造へマイグレート
    function migrateData(parsed) {
      if (!parsed) return parsed;
      // 旧 assignments → assignmentsByWeek へ
      if (parsed.assignments && !parsed.assignmentsByWeek) {
        parsed.assignmentsByWeek = { [parsed.weekStartDate]: parsed.assignments };
        delete parsed.assignments;
      }
      if (!parsed.assignmentsByWeek) parsed.assignmentsByWeek = {};
      // 現場種別 normal → day
      if (parsed.sites) {
        parsed.sites = parsed.sites.map(s => s.type === 'normal' ? { ...s, type: 'day' } : s);
      }
      // 特殊枠の追加: 有給休暇 が無ければ追加
      if (parsed.sites && !parsed.sites.some(s => s.id === 'paid_leave')) {
        parsed.sites = [...parsed.sites, { id: 'paid_leave', name: '有給休暇', type: 'special' }];
      }
      // 予定登録のスキーマ
      if (!parsed.schedules) {
        parsed.schedules = { holidays: [], leaves: [], trainings: [], required: [] };
      } else {
        if (!parsed.schedules.holidays) parsed.schedules.holidays = [];
        if (!parsed.schedules.leaves) parsed.schedules.leaves = [];
        if (!parsed.schedules.trainings) parsed.schedules.trainings = [];
        if (!parsed.schedules.required) parsed.schedules.required = [];
      }
      // 週ごとメモ (旧:単一文字列、新:7要素配列)
      if (!parsed.weekMemos) parsed.weekMemos = {};
      else {
        Object.keys(parsed.weekMemos).forEach(wk => {
          const v = parsed.weekMemos[wk];
          if (typeof v === 'string') {
            // 旧形式(日曜のみ)を配列に変換
            parsed.weekMemos[wk] = ['', '', '', '', '', '', v];
          } else if (!Array.isArray(v)) {
            parsed.weekMemos[wk] = ['', '', '', '', '', '', ''];
          } else if (v.length < 7) {
            const arr = [...v];
            while (arr.length < 7) arr.push('');
            parsed.weekMemos[wk] = arr;
          }
        });
      }
      // 「お休み」→「休み」リネーム
      if (parsed.sites) {
        parsed.sites = parsed.sites.map(s => (s.id === 'rest' && s.name === 'お休み') ? { ...s, name: '休み' } : s);
      }
      // 特殊枠の並び順を統一: 講習 → 休み → 有給休暇
      if (parsed.sites) {
        const nonSpecial = parsed.sites.filter(s => s.type !== 'special');
        const orderIds = ['training', 'rest', 'paid_leave'];
        const orderedSpecials = [];
        orderIds.forEach(id => {
          const found = parsed.sites.find(s => s.id === id && s.type === 'special');
          if (found) orderedSpecials.push(found);
        });
        // 上記以外の特殊枠(将来追加された場合)も末尾に残す
        const otherSpecials = parsed.sites.filter(s =>
          s.type === 'special' && !orderIds.includes(s.id)
        );
        parsed.sites = [...nonSpecial, ...orderedSpecials, ...otherSpecials];
      }
      // weekStartDateが月曜でなければ月曜に正規化し、assignmentsByWeekキーも揃える
      if (parsed.weekStartDate) {
        const normalize = (dateStr) => {
          const d = parseLocalDate(dateStr);
          const m = getMonday(d);
          return toLocalDateStr(m);
        };
        parsed.weekStartDate = normalize(parsed.weekStartDate);
        if (parsed.assignmentsByWeek) {
          const remapped = {};
          Object.entries(parsed.assignmentsByWeek).forEach(([wk, val]) => {
            const newKey = normalize(wk);
            const hasContent = (arr) => (arr || []).some(da => Object.values(da).some(list => (list || []).length > 0));
            if (remapped[newKey]) {
              if (!hasContent(remapped[newKey]) && hasContent(val)) {
                remapped[newKey] = val;
              }
            } else {
              remapped[newKey] = val;
            }
          });
          parsed.assignmentsByWeek = remapped;
        }
      }
      return parsed;
    }

    function getMonday(d) {
      d = new Date(d);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

    // YYYY-MM-DD 文字列をローカル日付として安全にパース
    function parseLocalDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    // ローカル日付を YYYY-MM-DD に
    function toLocalDateStr(d) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatDate(dateStr, dayOffset) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + dayOffset);
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function formatFullDate(dateStr, dayOffset) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + dayOffset);
      const dows = ['日', '月', '火', '水', '木', '金', '土'];
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日(${dows[d.getDay()]})`;
    }

    function formatTodayJP() {
      const d = new Date();
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function DemenApp() {
      const [data, setData] = useState(getInitialData());
      const [showSettings, setShowSettings] = useState(false);
      const [settingsTab, setSettingsTab] = useState('workers');
      const [draggedWorker, setDraggedWorker] = useState(null);
      const [tapMode, setTapMode] = useState(null); // { workerId, day }
      const [selectedDay, setSelectedDay] = useState(0); // 人員ボードでフィルタする曜日 (0-6) または null=全週
      const [editingWorker, setEditingWorker] = useState(null);
      const [editingSite, setEditingSite] = useState(null);
      const [newWorkerName, setNewWorkerName] = useState('');
      const [newSiteName, setNewSiteName] = useState('');
      const [newSiteType, setNewSiteType] = useState('day');
      const [savedFiles, setSavedFiles] = useState([]);
      const [showSaveDialog, setShowSaveDialog] = useState(false);
      const [showLoadDialog, setShowLoadDialog] = useState(false);
      const [saveName, setSaveName] = useState('');
      const [showCsvDialog, setShowCsvDialog] = useState(null); // 'workers' | 'sites' | null
      const [csvText, setCsvText] = useState('');
      const [csvMode, setCsvMode] = useState('append'); // 'append' | 'replace'
      const csvFileInputRef = useRef(null);
      const [confirmDialog, setConfirmDialog] = useState(null); // { message, onConfirm }
      const [toast, setToast] = useState(null); // 通知用
      const [showPrintPreview, setShowPrintPreview] = useState(false);
      const printRef = useRef(null);

      // 並び替えD&D用 (workers/sites)
      const [reorderDrag, setReorderDrag] = useState(null); // { kind: 'worker'|'site', id }
      const [reorderHover, setReorderHover] = useState(null); // { kind, id, position: 'above'|'below' }
      // 優先メンバー編集
      const [preferredEditSite, setPreferredEditSite] = useState(null); // siteId or null
      // アンドゥ履歴
      const historyRef = useRef([]);
      const isUndoingRef = useRef(false);
      const HISTORY_LIMIT = 50;
      // 予定登録モーダル
      const [showScheduleModal, setShowScheduleModal] = useState(false);
      const [scheduleTab, setScheduleTab] = useState('holidays');
      const [scheduleForm, setScheduleForm] = useState({
        date: '', workerId: '', workerIds: [], siteId: '', type: 'paid',
      });

      // ===== 選択・コピペ系 =====
      const [selectedWorkers, setSelectedWorkers] = useState(new Set()); // "day::siteId::workerId"
      const [activeCell, setActiveCell] = useState(null); // { day, siteId } ペースト基点
      const [clipboard, setClipboard] = useState(null); // { mode, items: [{day, siteIdx, siteId, workerIds}] }
      const [contextMenu, setContextMenu] = useState(null); // { x, y }
      const [rectSelect, setRectSelect] = useState(null); // { startX, startY, currX, currY }
      const gridRef = useRef(null);

      // 起動時に最後のデータをロード
      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const parsed = migrateData(JSON.parse(stored));
            setData(parsed);
          }
          const settings = localStorage.getItem(SETTINGS_KEY);
          if (settings) {
            setSavedFiles(JSON.parse(settings).savedFiles || []);
          }
        } catch (e) {
          console.error('Load error', e);
        }
      }, []);

      // データ変更を自動保存
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
          console.error('Save error', e);
        }
      }, [data]);

      // アンドゥ用に data の変更を履歴に積む
      useEffect(() => {
        if (isUndoingRef.current) {
          isUndoingRef.current = false;
          return;
        }
        historyRef.current.push(data);
        if (historyRef.current.length > HISTORY_LIMIT) historyRef.current.shift();
      }, [data]);

      const undo = () => {
        if (historyRef.current.length < 2) {
          showToast('これ以上戻せません');
          return;
        }
        historyRef.current.pop(); // 現在状態を捨てる
        const prev = historyRef.current[historyRef.current.length - 1];
        isUndoingRef.current = true;
        setData(prev);
        showToast('元に戻しました');
      };

      // PDF保存時のファイル名のため、週範囲をタイトルに反映
      useEffect(() => {
        try {
          const start = parseLocalDate(data.weekStartDate);
          const end = new Date(start);
          end.setDate(end.getDate() + 6);
          document.title = `Dezoo_工事出面表_${start.getFullYear()}年${start.getMonth() + 1}月${start.getDate()}日-${end.getMonth() + 1}月${end.getDate()}日`;
        } catch (e) {
          document.title = 'Dezoo';
        }
      }, [data.weekStartDate]);

      // 確認ダイアログヘルパー
      const askConfirm = (message, onConfirm) => {
        setConfirmDialog({ message, onConfirm });
      };

      // トースト表示
      const showToast = (message) => {
        setToast(message);
        setTimeout(() => setToast(null), 2500);
      };

      // ===== 週ごとアサインメント アクセスヘルパー =====
      const currentAssignments = data.assignmentsByWeek?.[data.weekStartDate] || emptyWeekAssignments();
      const currentWeekMemos = data.weekMemos?.[data.weekStartDate] || ['', '', '', '', '', '', ''];
      const updateWeekMemo = (dayIdx, text) => {
        setData(prev => {
          const cur = prev.weekMemos?.[prev.weekStartDate] || ['', '', '', '', '', '', ''];
          const arr = [...cur];
          while (arr.length < 7) arr.push('');
          arr[dayIdx] = text;
          return {
            ...prev,
            weekMemos: { ...(prev.weekMemos || {}), [prev.weekStartDate]: arr },
          };
        });
      };

      // 現在週のassignmentsだけを更新するヘルパー
      const updateCurrentWeekAssignments = (transform) => {
        setData(prev => {
          const cur = prev.assignmentsByWeek?.[prev.weekStartDate] || emptyWeekAssignments();
          const next = transform(cur, prev);
          return {
            ...prev,
            assignmentsByWeek: { ...(prev.assignmentsByWeek || {}), [prev.weekStartDate]: next },
          };
        });
      };

      // ===== 配置操作 =====
      const assignWorker = (workerId, day, siteId) => {
        updateCurrentWeekAssignments((cur, prev) => {
          const newAssignments = cur.map((dayAssign, i) => {
            if (i !== day) return dayAssign;
            const newDay = { ...dayAssign };
            // 同日の他現場から削除(昼夜現場以外)
            // 昼現場と夜現場は両立可能とする
            const targetSite = prev.sites.find(s => s.id === siteId);
            Object.keys(newDay).forEach(sid => {
              const site = prev.sites.find(s => s.id === sid);
              if (!site) return;
              // 昼夜の組み合わせ以外は重複排除
              const allowDual = (
                (targetSite?.type === 'day' && site.type === 'night') ||
                (targetSite?.type === 'night' && site.type === 'day')
              );
              if (!allowDual && sid !== siteId) {
                newDay[sid] = (newDay[sid] || []).filter(wid => wid !== workerId);
              }
            });
            // 対象現場に追加(重複排除)
            const list = (newDay[siteId] || []).filter(wid => wid !== workerId);
            list.push(workerId);
            newDay[siteId] = list;
            return newDay;
          });
          return newAssignments;
        });
      };

      const removeWorker = (workerId, day, siteId) => {
        updateCurrentWeekAssignments((cur) => {
          return cur.map((dayAssign, i) => {
            if (i !== day) return dayAssign;
            const newDay = { ...dayAssign };
            newDay[siteId] = (newDay[siteId] || []).filter(wid => wid !== workerId);
            return newDay;
          });
        });
      };

      // 同日内で並べ替え
      const reorderInCell = (day, siteId, fromIdx, toIdx) => {
        updateCurrentWeekAssignments((cur) => {
          const newAssignments = [...cur];
          const list = [...(newAssignments[day][siteId] || [])];
          const [moved] = list.splice(fromIdx, 1);
          list.splice(toIdx, 0, moved);
          newAssignments[day] = { ...newAssignments[day], [siteId]: list };
          return newAssignments;
        });
      };

      // 削除済を除いたアクティブ一覧
      const activeWorkers = data.workers.filter(w => !w.deleted);
      const activeSites = data.sites.filter(s => !s.deleted);

      // ===== ワーカー管理 =====
      const addWorker = () => {
        if (!newWorkerName.trim()) return;
        if (activeWorkers.length >= 100) {
          showToast('人員は最大100名までです');
          return;
        }
        const newWorker = {
          id: 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          name: newWorkerName.trim(),
        };
        setData(prev => ({ ...prev, workers: [...prev.workers, newWorker] }));
        setNewWorkerName('');
      };

      const updateWorker = (id, name) => {
        setData(prev => ({
          ...prev,
          workers: prev.workers.map(w => w.id === id ? { ...w, name } : w),
        }));
        setEditingWorker(null);
      };

      const updateWorkerColor = (id, color) => {
        setData(prev => ({
          ...prev,
          workers: prev.workers.map(w => w.id === id ? { ...w, color: color || null } : w),
        }));
      };

      const updateWorkerAffiliation = (id, affiliation) => {
        setData(prev => ({
          ...prev,
          workers: prev.workers.map(w => w.id === id ? { ...w, affiliation } : w),
        }));
      };

      // ===== 並べ替え (workers / sites) =====
      const reorderWorkers = (fromId, toId, position) => {
        if (fromId === toId) return;
        setData(prev => {
          const arr = [...prev.workers];
          const fromIdx = arr.findIndex(w => w.id === fromId);
          if (fromIdx < 0) return prev;
          const [moved] = arr.splice(fromIdx, 1);
          let toIdx = arr.findIndex(w => w.id === toId);
          if (toIdx < 0) return prev;
          if (position === 'below') toIdx += 1;
          arr.splice(toIdx, 0, moved);
          return { ...prev, workers: arr };
        });
      };

      const reorderSites = (fromId, toId, position) => {
        if (fromId === toId) return;
        setData(prev => {
          // specialは末尾固定
          const normal = prev.sites.filter(s => s.type !== 'special');
          const specials = prev.sites.filter(s => s.type === 'special');
          const fromIdx = normal.findIndex(s => s.id === fromId);
          if (fromIdx < 0) return prev;
          const [moved] = normal.splice(fromIdx, 1);
          let toIdx = normal.findIndex(s => s.id === toId);
          if (toIdx < 0) return prev;
          if (position === 'below') toIdx += 1;
          normal.splice(toIdx, 0, moved);
          return { ...prev, sites: [...normal, ...specials] };
        });
      };

      const sortWorkers = (key) => {
        const colorOrder = COLOR_PALETTE.map(p => p.id);
        setData(prev => {
          const arr = [...prev.workers];
          arr.sort((a, b) => {
            if (key === 'name') return (a.name || '').localeCompare(b.name || '', 'ja');
            if (key === 'affiliation') {
              const ax = a.affiliation || '\uFFFF'; // 未設定を最後に
              const bx = b.affiliation || '\uFFFF';
              const c = ax.localeCompare(bx, 'ja');
              if (c !== 0) return c;
              return (a.name || '').localeCompare(b.name || '', 'ja');
            }
            if (key === 'color') {
              const ai = a.color ? colorOrder.indexOf(a.color) : 999;
              const bi = b.color ? colorOrder.indexOf(b.color) : 999;
              if (ai !== bi) return ai - bi;
              return (a.name || '').localeCompare(b.name || '', 'ja');
            }
            return 0;
          });
          return { ...prev, workers: arr };
        });
        showToast('並び替えました');
      };

      const deleteWorker = (id) => {
        const w = data.workers.find(x => x.id === id);
        askConfirm(`「${w?.name || ''}」を削除しますか？\n（パレットからは消えますが、過去の出面表には残ります）`, () => {
          setData(prev => ({
            ...prev,
            workers: prev.workers.map(x => x.id === id ? { ...x, deleted: true } : x),
          }));
        });
      };

      // ===== 現場管理 =====
      const addSite = () => {
        if (!newSiteName.trim()) return;
        const newSite = {
          id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          name: newSiteName.trim(),
          type: newSiteType,
        };
        setData(prev => ({ ...prev, sites: [...prev.sites, newSite] }));
        setNewSiteName('');
        setNewSiteType('day');
      };

      const updateSite = (id, name, type) => {
        setData(prev => ({
          ...prev,
          sites: prev.sites.map(s => s.id === id ? { ...s, name, type } : s),
        }));
        setEditingSite(null);
      };

      const updateSitePreferred = (id, preferredWorkerIds) => {
        setData(prev => ({
          ...prev,
          sites: prev.sites.map(s => s.id === id ? { ...s, preferredWorkerIds } : s),
        }));
      };

      const deleteSite = (id) => {
        if (id === 'rest' || id === 'training' || id === 'paid_leave') {
          showToast('特殊枠（お休み・講習・有給休暇）は削除できません');
          return;
        }
        const s = data.sites.find(x => x.id === id);
        askConfirm(`「${s?.name || ''}」を削除しますか？\n（マスターからは消えますが、過去の出面表には残ります）`, () => {
          setData(prev => ({
            ...prev,
            sites: prev.sites.map(x => x.id === id ? { ...x, deleted: true } : x),
          }));
        });
      };

      // ===== CSV取り込み =====
      const parseCsvLine = (line) => {
        // シンプルCSVパース(カンマ・タブ区切り、ダブルクォート対応)
        const result = [];
        let cur = '';
        let inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQuote) {
            if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
            else if (ch === '"') { inQuote = false; }
            else { cur += ch; }
          } else {
            if (ch === '"') { inQuote = true; }
            else if (ch === ',' || ch === '\t') { result.push(cur); cur = ''; }
            else { cur += ch; }
          }
        }
        result.push(cur);
        return result.map(s => s.trim());
      };

      const parseCsv = (text) => {
        return text
          .replace(/\r\n/g, '\n')
          .replace(/\r/g, '\n')
          .split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0)
          .map(parseCsvLine);
      };

      const importWorkersCsv = () => {
        if (!csvText.trim()) {
          showToast('データを入力してください');
          return;
        }
        const rows = parseCsv(csvText);
        // ヘッダー行検出: 1列目が「名前」「氏名」などなら飛ばす
        const headerKeywords = ['名前', '氏名', 'name', '人員'];
        let startIdx = 0;
        if (rows.length > 0 && headerKeywords.some(k => rows[0][0]?.toLowerCase().includes(k.toLowerCase()))) {
          startIdx = 1;
        }
        const newNames = [];
        for (let i = startIdx; i < rows.length; i++) {
          const name = rows[i][0]?.trim();
          if (name) newNames.push(name);
        }
        if (newNames.length === 0) {
          showToast('読み込める名前がありませんでした');
          return;
        }

        const newWorkers = newNames.map((name, idx) => ({
          id: 'w_' + Date.now() + '_' + idx + '_' + Math.random().toString(36).slice(2, 5),
          name,
        }));

        let resultMsg = '';
        setData(prev => {
          let workers;
          if (csvMode === 'replace') {
            // 既存は論理削除して残す(過去出面表のため)、新規を追加
            const tombstoned = prev.workers.map(w => ({ ...w, deleted: true }));
            workers = [...tombstoned, ...newWorkers];
            resultMsg = `${newNames.length}名で置換しました（過去データは保持）`;
          } else {
            const activeCount = prev.workers.filter(w => !w.deleted).length;
            const combined = [...prev.workers, ...newWorkers];
            const totalActive = activeCount + newWorkers.length;
            if (totalActive > 100) {
              const canAdd = Math.max(0, 100 - activeCount);
              workers = [...prev.workers, ...newWorkers.slice(0, canAdd)];
              resultMsg = `${canAdd}名のみ追加(100名上限)`;
            } else {
              workers = combined;
              resultMsg = `${newNames.length}名を追加しました`;
            }
          }
          return { ...prev, workers };
        });

        setShowCsvDialog(null);
        setCsvText('');
        showToast(resultMsg);
      };

      const importSitesCsv = () => {
        if (!csvText.trim()) {
          showToast('データを入力してください');
          return;
        }
        const rows = parseCsv(csvText);
        const headerKeywords = ['現場', 'name', '名称'];
        let startIdx = 0;
        if (rows.length > 0 && headerKeywords.some(k => rows[0][0]?.toLowerCase().includes(k.toLowerCase()))) {
          startIdx = 1;
        }
        const parseType = (s) => {
          if (!s) return 'day';
          const t = s.trim().toLowerCase();
          if (t === '夜' || t === 'night' || t === 'n') return 'night';
          // 昼/通常/空欄 すべて day 扱い
          return 'day';
        };
        const newSites = [];
        for (let i = startIdx; i < rows.length; i++) {
          const name = rows[i][0]?.trim();
          if (!name) continue;
          const type = parseType(rows[i][1]);
          newSites.push({
            id: 's_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2, 5),
            name,
            type,
          });
        }
        if (newSites.length === 0) {
          showToast('読み込める現場名がありませんでした');
          return;
        }

        let resultMsg = '';
        setData(prev => {
          let sites;
          const specials = prev.sites.filter(s => s.type === 'special');
          const nonSpecial = prev.sites.filter(s => s.type !== 'special');
          if (csvMode === 'replace') {
            // 既存の通常現場は論理削除して残す(過去出面表のため)、新規を追加。特殊枠はそのまま
            const tombstoned = nonSpecial.map(s => ({ ...s, deleted: true }));
            sites = [...tombstoned, ...newSites, ...specials];
            resultMsg = `${newSites.length}件で置換しました（過去データは保持）`;
          } else {
            resultMsg = `${newSites.length}件を追加しました`;
            sites = [...nonSpecial, ...newSites, ...specials];
          }
          return { ...prev, sites };
        });

        setShowCsvDialog(null);
        setCsvText('');
        showToast(resultMsg);
      };

      const handleCsvFileSelect = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setCsvText(ev.target.result);
        };
        reader.readAsText(file, 'UTF-8');
        e.target.value = ''; // 同じファイルを再選択できるようにリセット
      };

      // ===== ファイル管理 =====
      const saveAs = () => {
        if (!saveName.trim()) return;
        const file = {
          name: saveName.trim(),
          savedAt: new Date().toISOString(),
          data: data,
        };
        const newFiles = [...savedFiles.filter(f => f.name !== file.name), file];
        setSavedFiles(newFiles);
        localStorage.setItem(SETTINGS_KEY, JSON.stringify({ savedFiles: newFiles }));
        setShowSaveDialog(false);
        setSaveName('');
      };

      // 保存ボタン押下: 該当週の最新ver.の次番号で自動保存
      const quickSave = () => {
        const wk = data.weekStartDate;
        const versions = savedFiles
          .map(f => {
            const m = f.name.match(/^(.+)_ver\.(\d+)$/);
            if (!m) return null;
            return { wk: m[1], n: Number(m[2]) };
          })
          .filter(x => x && x.wk === wk);
        const next = versions.length > 0 ? Math.max(...versions.map(v => v.n)) + 1 : 1;
        const name = `${wk}_ver.${next}`;
        const file = {
          name,
          savedAt: new Date().toISOString(),
          data: data,
        };
        const newFiles = [...savedFiles, file];
        setSavedFiles(newFiles);
        localStorage.setItem(SETTINGS_KEY, JSON.stringify({ savedFiles: newFiles }));
        showToast(`${name} として保存しました`);
      };

      const loadFile = (file) => {
        setData(migrateData({ ...file.data }));
        setShowLoadDialog(false);
      };

      const deleteFile = (name) => {
        askConfirm(`「${name}」を削除しますか？`, () => {
          const newFiles = savedFiles.filter(f => f.name !== name);
          setSavedFiles(newFiles);
          localStorage.setItem(SETTINGS_KEY, JSON.stringify({ savedFiles: newFiles }));
        });
      };

      // 前週取り込み: 現在週の前週(月曜)の配置を現在週へコピー
      const importPreviousWeek = () => {
        const d = parseLocalDate(data.weekStartDate);
        d.setDate(d.getDate() - 7);
        const prevWk = toLocalDateStr(d);
        const prevAssign = data.assignmentsByWeek?.[prevWk];
        if (!prevAssign) {
          showToast('前週のデータがありません');
          return;
        }
        const hasContent = currentAssignments.some(da => Object.values(da).some(list => (list || []).length > 0));
        const doImport = () => {
          updateCurrentWeekAssignments(() => prevAssign.map(da => {
            const nd = {};
            Object.keys(da).forEach(sid => { nd[sid] = [...(da[sid] || [])]; });
            return nd;
          }));
          showToast('前週の配置を取り込みました');
        };
        if (hasContent) {
          askConfirm('現在の週の配置を前週の内容で上書きしますか？', doImport);
        } else {
          doImport();
        }
      };

      const clearWeek = () => {
        askConfirm('今週の配置を全てクリアしますか？', () => {
          updateCurrentWeekAssignments(() => emptyWeekAssignments());
        });
      };

      // 週移動 (データはそのまま、表示週だけ切替)
      const shiftWeek = (delta) => {
        const d = parseLocalDate(data.weekStartDate);
        d.setDate(d.getDate() + 7 * delta);
        setData(prev => ({ ...prev, weekStartDate: toLocalDateStr(d) }));
      };

      // ===== PDF出力 =====
      const exportPDF = () => {
        setShowPrintPreview(true);
      };

      const getWeekRangeFull = () => {
        const start = new Date(data.weekStartDate);
        const end = new Date(data.weekStartDate);
        end.setDate(end.getDate() + 6);
        return `${start.getFullYear()}年${start.getMonth() + 1}月${start.getDate()}日 〜 ${end.getFullYear()}年${end.getMonth() + 1}月${end.getDate()}日`;
      };

      // 配置済みワーカーIDのリスト(全日通して)
      const getAssignedWorkerIds = (day) => {
        const ids = new Set();
        Object.values(currentAssignments[day] || {}).forEach(list => {
          (list || []).forEach(wid => ids.add(wid));
        });
        return ids;
      };

      // 表示順: アクティブな昼夜順 → アクティブな特殊 → 削除済でも当週に配置がある現場
      const getOrderedSites = () => {
        const dayNight = activeSites.filter(s => s.type === 'day' || s.type === 'night');
        const special = activeSites.filter(s => s.type === 'special');
        // 削除済だが現週に配置がある現場(過去出面表表示のため)
        const referenced = data.sites.filter(s => {
          if (!s.deleted) return false;
          return currentAssignments.some(da => (da[s.id] || []).length > 0);
        });
        return [...dayNight, ...special, ...referenced];
      };

      const orderedSites = getOrderedSites();
      const assignedSiteIds = new Set();
      currentAssignments.forEach(da => {
        Object.keys(da).forEach(sid => {
          if ((da[sid] || []).length > 0) assignedSiteIds.add(sid);
        });
      });

      // 表示する現場(配置がある or 全現場表示モード)
      const displaySites = orderedSites;

      const getWorkerName = (id) => data.workers.find(w => w.id === id)?.name || '?';

      // ===== 人員選択 =====
      const workerKey = (day, siteId, workerId) => `${day}::${siteId}::${workerId}`;
      const parseWorkerKey = (key) => {
        const parts = key.split('::');
        return { day: Number(parts[0]), siteId: parts[1], workerId: parts[2] };
      };

      const getCellWorkerKeys = (day, siteId) => {
        const ids = currentAssignments[day]?.[siteId] || [];
        return ids.map(wid => workerKey(day, siteId, wid));
      };

      // 単一人員クリック
      const clickWorker = (day, siteId, workerId, e) => {
        const key = workerKey(day, siteId, workerId);
        if (e && e.shiftKey) {
          // 追加のみ（外さない）
          setSelectedWorkers(prev => {
            const next = new Set(prev);
            next.add(key);
            return next;
          });
        } else if (e && (e.ctrlKey || e.metaKey)) {
          // トグル
          setSelectedWorkers(prev => {
            const next = new Set(prev);
            if (next.has(key)) next.delete(key);
            else next.add(key);
            return next;
          });
        } else {
          // 単独選択
          setSelectedWorkers(new Set([key]));
        }
        setActiveCell({ day, siteId });
      };

      // セル空き領域クリック → セル全員選択
      const clickCell = (day, siteId, e) => {
        const cellKeys = getCellWorkerKeys(day, siteId);
        if (e && e.shiftKey) {
          // セル全員を追加のみ
          setSelectedWorkers(prev => {
            const next = new Set(prev);
            cellKeys.forEach(k => next.add(k));
            return next;
          });
        } else if (e && (e.ctrlKey || e.metaKey)) {
          // セル全員をトグル（全選択 or 全解除）
          setSelectedWorkers(prev => {
            const next = new Set(prev);
            const allIn = cellKeys.length > 0 && cellKeys.every(k => next.has(k));
            if (allIn) cellKeys.forEach(k => next.delete(k));
            else cellKeys.forEach(k => next.add(k));
            return next;
          });
        } else {
          setSelectedWorkers(new Set(cellKeys));
        }
        setActiveCell({ day, siteId });
      };

      // ===== コピー / カット / ペースト =====
      // 選択中の人員を (day, siteId) ごとにグループ化
      const groupSelectedByCell = () => {
        const groups = new Map(); // key=`${day}::${siteId}` → { day, siteId, siteIdx, workerIds }
        selectedWorkers.forEach(key => {
          const { day, siteId, workerId } = parseWorkerKey(key);
          const gKey = `${day}::${siteId}`;
          if (!groups.has(gKey)) {
            const siteIdx = displaySites.findIndex(s => s.id === siteId);
            if (siteIdx < 0) return;
            groups.set(gKey, { day, siteId, siteIdx, workerIds: [] });
          }
          groups.get(gKey).workerIds.push(workerId);
        });
        return Array.from(groups.values());
      };

      const buildClipboard = (mode) => {
        if (selectedWorkers.size === 0) {
          showToast('人員を選択してください');
          return;
        }
        const items = groupSelectedByCell();
        if (items.length === 0) return;
        setClipboard({ mode, items });
        showToast(mode === 'cut' ? `${selectedWorkers.size}名をカット` : `${selectedWorkers.size}名をコピー`);
      };

      const pasteClipboard = () => {
        if (!clipboard) {
          showToast('クリップボードが空です');
          return;
        }
        if (!activeCell) {
          showToast('貼り付け先のセルをクリックしてください');
          return;
        }
        const targetSite = displaySites.find(s => s.id === activeCell.siteId);
        if (!targetSite) return;
        const tDay = activeCell.day;
        // 選択していた人員を全員ターゲットセルに集約（重複排除）
        const allWorkerIds = [];
        clipboard.items.forEach(it => {
          it.workerIds.forEach(wid => {
            if (!allWorkerIds.includes(wid)) allWorkerIds.push(wid);
          });
        });

        const newSelection = new Set();
        updateCurrentWeekAssignments((cur, prev) => {
          const newAssignments = cur.map(da => ({ ...da }));
          // Cut元から削除（同一週内のCutのみ）
          if (clipboard.mode === 'cut') {
            clipboard.items.forEach(it => {
              newAssignments[it.day] = { ...newAssignments[it.day] };
              const list = newAssignments[it.day][it.siteId] || [];
              newAssignments[it.day][it.siteId] = list.filter(wid => !it.workerIds.includes(wid));
            });
          }

          // ターゲットセルに追加(重複排除)
          const existing = (newAssignments[tDay][targetSite.id] || []).filter(wid => !allWorkerIds.includes(wid));
          const merged = [...existing, ...allWorkerIds];

          // 同日他セルから(昼夜以外)除外
          Object.keys(newAssignments[tDay]).forEach(sid => {
            if (sid === targetSite.id) return;
            const otherSite = prev.sites.find(s => s.id === sid);
            if (!otherSite) return;
            const allowDual = (
              (targetSite.type === 'day' && otherSite.type === 'night') ||
              (targetSite.type === 'night' && otherSite.type === 'day')
            );
            if (!allowDual) {
              newAssignments[tDay][sid] = (newAssignments[tDay][sid] || []).filter(wid => !allWorkerIds.includes(wid));
            }
          });

          newAssignments[tDay] = { ...newAssignments[tDay], [targetSite.id]: merged };
          allWorkerIds.forEach(wid => newSelection.add(workerKey(tDay, targetSite.id, wid)));
          return newAssignments;
        });

        if (clipboard.mode === 'cut') setClipboard(null);
        setSelectedWorkers(newSelection);
        showToast('ペーストしました');
      };

      // ===== 予定登録 ヘルパー =====
      const getWeekKeyForDate = (dateStr) => toLocalDateStr(getMonday(parseLocalDate(dateStr)));
      const getDayIndexInWeek = (dateStr, weekKey) => {
        const d = parseLocalDate(dateStr);
        const m = parseLocalDate(weekKey);
        return Math.round((d - m) / 86400000);
      };
      const isCompanyHoliday = (dateStr) =>
        (data.schedules?.holidays || []).some(h => h.date === dateStr);

      // 任意日付のセルを更新(該当週のassignmentsByWeekを直接書き換え)
      const updateAssignmentsForDate = (dateStr, dayUpdater) => {
        const weekKey = getWeekKeyForDate(dateStr);
        const dayIdx = getDayIndexInWeek(dateStr, weekKey);
        if (dayIdx < 0 || dayIdx > 6) return;
        setData(prev => {
          const week = prev.assignmentsByWeek?.[weekKey] || emptyWeekAssignments();
          const newWeek = [...week];
          newWeek[dayIdx] = dayUpdater(week[dayIdx] || {}, prev);
          return {
            ...prev,
            assignmentsByWeek: { ...(prev.assignmentsByWeek || {}), [weekKey]: newWeek },
          };
        });
      };

      // ===== 予定登録 アクション =====
      // CSV取り込み(会社休日)
      const importHolidaysCsv = () => {
        if (!csvText.trim()) { showToast('データを入力してください'); return; }
        const lines = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').map(l => l.trim()).filter(Boolean);
        const tryParseDate = (s) => {
          let m = s.match(/^(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})日?$/);
          if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
          m = s.match(/^(\d{1,2})[/-](\d{1,2})$/);
          if (m) {
            const y = new Date().getFullYear();
            return `${y}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
          }
          return null;
        };
        const dates = [];
        const skipped = [];
        lines.forEach(line => {
          // 1列目だけ見る(カンマ区切り対応)
          const first = line.split(/[,\t]/)[0].trim();
          if (!first || /^(date|日付|休日)$/i.test(first)) return; // ヘッダ
          const d = tryParseDate(first);
          if (d) dates.push(d);
          else skipped.push(first);
        });
        if (dates.length === 0) { showToast('読み込める日付がありませんでした'); return; }

        setData(prev => {
          const existing = csvMode === 'replace' ? [] : (prev.schedules?.holidays || []);
          const existingDates = new Set(existing.map(h => h.date));
          const additions = [];
          dates.forEach(d => {
            if (existingDates.has(d)) return;
            existingDates.add(d);
            additions.push({ id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5), date: d });
          });
          return {
            ...prev,
            schedules: {
              ...(prev.schedules || {}),
              holidays: [...existing, ...additions],
            },
          };
        });
        setShowCsvDialog(null);
        setCsvText('');
        let msg = `${dates.length}件取り込みました`;
        if (skipped.length > 0) msg += ` (不正${skipped.length}件スキップ)`;
        if (csvMode === 'replace') msg += '(置換)';
        showToast(msg);
      };

      const addHoliday = (dateStr) => {
        if (!dateStr) { showToast('日付を選択してください'); return; }
        if ((data.schedules?.holidays || []).some(h => h.date === dateStr)) {
          showToast('既に登録済みです');
          return;
        }
        setData(prev => ({
          ...prev,
          schedules: {
            ...(prev.schedules || {}),
            holidays: [...(prev.schedules?.holidays || []), { id: 'h_' + Date.now(), date: dateStr }],
          },
        }));
        showToast('会社休日を登録しました');
      };
      const deleteSchedule = (kind, id) => {
        setData(prev => ({
          ...prev,
          schedules: {
            ...(prev.schedules || {}),
            [kind]: (prev.schedules?.[kind] || []).filter(x => x.id !== id),
          },
        }));
      };

      const addLeave = (dateStr, workerId, type) => {
        if (!dateStr || !workerId) { showToast('日付・人員を選択してください'); return; }
        const targetSiteId = type === 'paid' ? 'paid_leave' : 'rest';
        setData(prev => ({
          ...prev,
          schedules: {
            ...(prev.schedules || {}),
            leaves: [...(prev.schedules?.leaves || []), { id: 'l_' + Date.now(), date: dateStr, workerId, type }],
          },
        }));
        // 該当人員を該当日の対象セルへ移動(同日の他セルからは外す)
        updateAssignmentsForDate(dateStr, (cur) => {
          const nd = { ...cur };
          Object.keys(nd).forEach(sid => {
            if (sid === targetSiteId) return;
            nd[sid] = (nd[sid] || []).filter(wid => wid !== workerId);
          });
          const existing = (nd[targetSiteId] || []).filter(wid => wid !== workerId);
          nd[targetSiteId] = [...existing, workerId];
          return nd;
        });
        showToast('休暇を登録しました');
      };

      const addTraining = (dateStr, workerIds) => {
        if (!dateStr || !workerIds || workerIds.length === 0) { showToast('日付・人員を選択してください'); return; }
        setData(prev => ({
          ...prev,
          schedules: {
            ...(prev.schedules || {}),
            trainings: [...(prev.schedules?.trainings || []), { id: 't_' + Date.now(), date: dateStr, workerIds: [...workerIds] }],
          },
        }));
        updateAssignmentsForDate(dateStr, (cur) => {
          const nd = { ...cur };
          Object.keys(nd).forEach(sid => {
            if (sid === 'training') return;
            nd[sid] = (nd[sid] || []).filter(wid => !workerIds.includes(wid));
          });
          const existing = (nd['training'] || []).filter(wid => !workerIds.includes(wid));
          nd['training'] = [...existing, ...workerIds];
          return nd;
        });
        showToast('講習予定を登録しました');
      };

      const addRequired = (dateStr, siteId, workerIds) => {
        if (!dateStr || !siteId || !workerIds || workerIds.length === 0) {
          showToast('日付・現場・人員を選択してください'); return;
        }
        setData(prev => ({
          ...prev,
          schedules: {
            ...(prev.schedules || {}),
            required: [...(prev.schedules?.required || []), { id: 'r_' + Date.now(), date: dateStr, siteId, workerIds: [...workerIds] }],
          },
        }));
        updateAssignmentsForDate(dateStr, (cur, prev) => {
          const targetSite = prev.sites.find(s => s.id === siteId);
          if (!targetSite) return cur;
          const nd = { ...cur };
          // 同日他セル(昼夜以外)から該当人員を外す
          Object.keys(nd).forEach(sid => {
            if (sid === siteId) return;
            const otherSite = prev.sites.find(s => s.id === sid);
            if (!otherSite) return;
            const allowDual = (
              (targetSite.type === 'day' && otherSite.type === 'night') ||
              (targetSite.type === 'night' && otherSite.type === 'day')
            );
            if (!allowDual) {
              nd[sid] = (nd[sid] || []).filter(wid => !workerIds.includes(wid));
            }
          });
          const existing = (nd[siteId] || []).filter(wid => !workerIds.includes(wid));
          nd[siteId] = [...existing, ...workerIds];
          return nd;
        });
        showToast('必須人員を登録しました');
      };

      // ===== 曜日メニュー アクション =====
      const clearDay = (day) => {
        askConfirm(`${DAY_LABELS[day]}曜日の配置をすべてクリアしますか？`, () => {
          updateCurrentWeekAssignments((cur) => {
            const next = [...cur];
            next[day] = {};
            return next;
          });
          showToast(`${DAY_LABELS[day]}曜日をクリアしました`);
        });
      };

      // 曜日メニュー: 別の日に貼り付け
      const pasteDay = (targetDay) => {
        if (!clipboard) { showToast('クリップボードが空です'); return; }
        const newSelection = new Set();
        updateCurrentWeekAssignments((cur, prev) => {
          const newAssignments = cur.map(da => ({ ...da }));
          newAssignments[targetDay] = { ...newAssignments[targetDay] };
          clipboard.items.forEach(it => {
            const tSite = prev.sites.find(s => s.id === it.siteId);
            if (!tSite) return;
            const existing = (newAssignments[targetDay][it.siteId] || []).filter(wid => !it.workerIds.includes(wid));
            const merged = [...existing, ...it.workerIds];
            // 同日他セルから(昼夜以外)除外
            Object.keys(newAssignments[targetDay]).forEach(sid => {
              if (sid === it.siteId) return;
              const otherSite = prev.sites.find(s => s.id === sid);
              if (!otherSite) return;
              const allowDual = (
                (tSite.type === 'day' && otherSite.type === 'night') ||
                (tSite.type === 'night' && otherSite.type === 'day')
              );
              if (!allowDual) {
                newAssignments[targetDay][sid] = (newAssignments[targetDay][sid] || []).filter(wid => !it.workerIds.includes(wid));
              }
            });
            newAssignments[targetDay][it.siteId] = merged;
            it.workerIds.forEach(wid => newSelection.add(workerKey(targetDay, it.siteId, wid)));
          });
          return newAssignments;
        });
        setSelectedWorkers(newSelection);
        showToast(`${DAY_LABELS[targetDay]}曜日にペーストしました`);
      };

      const copyDay = (day) => {
        const items = [];
        displaySites.forEach((site) => {
          const siteIdx = displaySites.findIndex(s => s.id === site.id);
          const ids = currentAssignments[day]?.[site.id] || [];
          if (ids.length === 0) return;
          items.push({ day, siteIdx, siteId: site.id, workerIds: [...ids] });
        });
        if (items.length === 0) {
          showToast(`${DAY_LABELS[day]}曜日は配置がありません`);
          return;
        }
        setClipboard({ mode: 'copy', items });
        const total = items.reduce((s, it) => s + it.workerIds.length, 0);
        showToast(`${DAY_LABELS[day]}曜日(${total}名)をコピー`);
      };

      // 自動配置: ①優先メンバー → ②直近踏襲 → ③均等分配
      const autoAssignDay = (day) => {
        const newDayAssign = { ...(currentAssignments[day] || {}) };
        // すでに当日配置済みの人員
        const placed = new Set();
        Object.values(newDayAssign).forEach(list => (list || []).forEach(wid => placed.add(wid)));

        const pastWeeks = Object.keys(data.assignmentsByWeek || {})
          .filter(wk => wk !== data.weekStartDate)
          .sort((a, b) => b.localeCompare(a));

        const targetSites = displaySites.filter(s => s.type !== 'special' && !s.deleted);

        // ① 各現場の優先メンバーを最優先で投入
        targetSites.forEach(site => {
          const pref = (site.preferredWorkerIds || []).filter(wid => {
            const w = data.workers.find(x => x.id === wid);
            if (!w || w.deleted) return false;
            if (placed.has(wid)) return false;
            return true;
          });
          if (pref.length > 0) {
            newDayAssign[site.id] = [...(newDayAssign[site.id] || []), ...pref];
            pref.forEach(wid => placed.add(wid));
          }
        });

        // ② 直近の現場メンバー踏襲
        //    優先順: 同週の前日(近い順) → 過去週の同曜日(新しい順)
        const filterValid = (ids) => (ids || []).filter(wid => {
          const w = data.workers.find(x => x.id === wid);
          if (!w || w.deleted) return false;
          if (placed.has(wid)) return false;
          return true;
        });

        targetSites.forEach(site => {
          if ((newDayAssign[site.id] || []).length > 0) return;

          // (a) 同週の前日: D-1, D-2, ... 0
          let valid = [];
          for (let prevDay = day - 1; prevDay >= 0; prevDay--) {
            const ids = currentAssignments[prevDay]?.[site.id];
            if (ids && ids.length > 0) {
              const v = filterValid(ids);
              if (v.length > 0) { valid = v; break; }
            }
          }

          // (b) 見つからなければ過去週の同曜日
          if (valid.length === 0) {
            for (const wk of pastWeeks) {
              const ids = data.assignmentsByWeek[wk]?.[day]?.[site.id];
              if (ids && ids.length > 0) {
                const v = filterValid(ids);
                if (v.length > 0) { valid = v; break; }
              }
            }
          }

          if (valid.length > 0) {
            newDayAssign[site.id] = valid;
            valid.forEach(wid => placed.add(wid));
          }
        });

        // ③ 未配置メンバーを既存配置数の少ない現場へ均等分配
        const unassigned = activeWorkers.filter(w => !placed.has(w.id)).map(w => w.id);
        if (unassigned.length > 0 && targetSites.length > 0) {
          const buckets = targetSites.map(s => ({
            id: s.id,
            count: (newDayAssign[s.id] || []).length,
          }));
          unassigned.forEach(wid => {
            buckets.sort((a, b) => a.count - b.count);
            const bucket = buckets[0];
            newDayAssign[bucket.id] = [...(newDayAssign[bucket.id] || []), wid];
            bucket.count++;
          });
        }

        updateCurrentWeekAssignments((cur) => {
          const next = [...cur];
          next[day] = newDayAssign;
          return next;
        });
        showToast(`${DAY_LABELS[day]}曜日に自動配置しました`);
      };

      const clearSelectedWorkers = () => {
        if (selectedWorkers.size === 0) return;
        const groups = groupSelectedByCell();
        updateCurrentWeekAssignments((cur) => {
          const newAssignments = cur.map(da => ({ ...da }));
          groups.forEach(g => {
            if (newAssignments[g.day]) {
              newAssignments[g.day] = { ...newAssignments[g.day] };
              const list = newAssignments[g.day][g.siteId] || [];
              newAssignments[g.day][g.siteId] = list.filter(wid => !g.workerIds.includes(wid));
            }
          });
          return newAssignments;
        });
        setSelectedWorkers(new Set());
        showToast('削除しました');
      };

      // ===== キーボードショートカット =====
      useEffect(() => {
        const onKey = (e) => {
          // 入力中は無視
          const tag = (e.target?.tagName || '').toUpperCase();
          if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
          if (e.target?.isContentEditable) return;

          const ctrl = e.ctrlKey || e.metaKey;
          if (ctrl && (e.key === 'z' || e.key === 'Z')) {
            e.preventDefault();
            undo();
          } else if (ctrl && e.key === 'c') {
            e.preventDefault();
            buildClipboard('copy');
          } else if (ctrl && e.key === 'x') {
            e.preventDefault();
            buildClipboard('cut');
          } else if (ctrl && e.key === 'v') {
            e.preventDefault();
            pasteClipboard();
          } else if (e.key === 'Delete' || e.key === 'Backspace') {
            if (selectedWorkers.size > 0) {
              e.preventDefault();
              clearSelectedWorkers();
            }
          } else if (e.key === 'Escape') {
            setSelectedWorkers(new Set());
            setActiveCell(null);
            setContextMenu(null);
            setRectSelect(null);
          }
        };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [selectedWorkers, clipboard, activeCell, data, displaySites]);

      // ===== 矩形選択：ドキュメントレベルのpointermove/up =====
      useEffect(() => {
        if (!rectSelect) return;
        const startX = rectSelect.startX;
        const startY = rectSelect.startY;
        const onMove = (e) => {
          setRectSelect({ startX, startY, currX: e.clientX, currY: e.clientY });
          const x1 = Math.min(startX, e.clientX);
          const x2 = Math.max(startX, e.clientX);
          const y1 = Math.min(startY, e.clientY);
          const y2 = Math.max(startY, e.clientY);
          if (!gridRef.current) return;
          // 人員チップを矩形で判定
          const chips = gridRef.current.querySelectorAll('[data-worker-key]');
          const next = new Set();
          chips.forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.right < x1 || r.left > x2 || r.bottom < y1 || r.top > y2) return;
            next.add(el.dataset.workerKey);
          });
          setSelectedWorkers(next);
        };
        const onUp = () => {
          setRectSelect(null);
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        return () => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
        };
      }, [rectSelect?.startX, rectSelect?.startY]);

      // 右クリックメニューを閉じる
      useEffect(() => {
        if (!contextMenu) return;
        const close = () => setContextMenu(null);
        document.addEventListener('click', close);
        document.addEventListener('scroll', close, true);
        return () => {
          document.removeEventListener('click', close);
          document.removeEventListener('scroll', close, true);
        };
      }, [contextMenu]);

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap');

            * {
              box-sizing: border-box;
              -webkit-tap-highlight-color: transparent;
            }

            .demen-root {
              font-family: 'Noto Sans JP', sans-serif;
              background: #f4f4f0;
              min-height: 100vh;
              color: #1a1a1a;
            }

            .demen-header {
              background: #1a1a1a;
              color: #fff;
              padding: 12px 16px;
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 12px;
              flex-wrap: wrap;
              border-bottom: 4px solid #ff6b35;
            }

            .demen-title {
              font-weight: 900;
              font-size: 18px;
              letter-spacing: 0.05em;
              display: flex;
              align-items: center;
              gap: 8px;
            }

            .demen-title-mark {
              background: #ff6b35;
              color: #1a1a1a;
              padding: 2px 8px;
              font-family: 'Roboto Mono', monospace;
              font-size: 12px;
              font-weight: 700;
            }

            .demen-toolbar {
              display: flex;
              gap: 6px;
              flex-wrap: wrap;
              align-items: center;
            }

            .btn {
              background: #fff;
              color: #1a1a1a;
              border: 2px solid #1a1a1a;
              padding: 7px 12px;
              font-size: 13px;

              display: inline-flex;
              align-items: center;
              gap: 5px;

            }

              background: #ff6b35;
              color: #fff;
            }

              transform: translate(1px, 1px);
            }

              background: #ff6b35;
              color: #fff;
              border-color: #ff6b35;
            }

            .btn-primary:hover {
              background: #1a1a1a;
              border-color: #1a1a1a;
            }

            .btn-ghost {
              background: transparent;
              color: #fff;
              border-color: #fff;
            }

            .btn-ghost:hover {
              background: #fff;

            }

              background: #fff;

            }

              padding: 4px 8px;

            }

              background: #fff;

            /* ワーカープール = 横帯 */
            .worker-pool {
              background: #fff;

              padding: 8px 10px;
              max-height: 180px;
              overflow-y: auto;
            }

            .pool-header {
              display: flex;
